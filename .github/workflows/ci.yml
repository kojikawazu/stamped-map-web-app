name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
    paths:
      - "front/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "front/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm exec nuxt prepare
        env:
          NUXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NUXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NUXT_PUBLIC_MAPTILER_KEY: dummy-maptiler-key

      - name: Unit & integration tests
        run: pnpm test
        env:
          NUXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NUXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NUXT_PUBLIC_MAPTILER_KEY: dummy-maptiler-key

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Build Nuxt
        run: pnpm build
        env:
          NUXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NUXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NUXT_PUBLIC_MAPTILER_KEY: dummy-maptiler-key
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Start production server
        run: |
          PORT=3000 HOST=0.0.0.0 \
          NUXT_PUBLIC_SUPABASE_URL=https://dummy.supabase.co \
          NUXT_PUBLIC_SUPABASE_ANON_KEY=dummy-anon-key \
          NUXT_PUBLIC_MAPTILER_KEY=dummy-maptiler-key \
          DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy \
          node .output/server/index.mjs > /tmp/nitro.log 2>&1 &
          echo "Nitro PID: $!"

      - name: Wait for production server
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 1; done' \
            || (echo "=== nitro.log ===" && cat /tmp/nitro.log && exit 1)

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NUXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NUXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NUXT_PUBLIC_MAPTILER_KEY: dummy-maptiler-key
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front/playwright-report/
          retention-days: 7
